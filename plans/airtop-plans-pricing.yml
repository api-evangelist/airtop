    type: feature
    metric: credits
    limit: 30000
    timeFrame: month
    geo: global
    unit: 1
    price: included (30,000+ per month, varies by commitment)
    userMultiplied: false
  - label: Simultaneous Sessions
    name: starter_sessions
    type: feature
    metric: sessions
    limit: 3
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
