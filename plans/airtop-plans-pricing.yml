specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Airtop
providerId: airtop
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- Browser Automation
- AI Agents
- Cloud Browser
- Web Scraping
- Plans
description: >-
  Airtop sells access to its cloud-browser API through credit-based monthly
  tiers plus a usage credit balance. Every tier includes a pool of credits and
  a maximum number of simultaneous sessions; credits are consumed by browser
  activity - page loads, interactions, scraping, and AI page-query / extraction
  operations (more complex work such as captcha solving costs more credits).
  A Free tier offers a starting credit pool, and Starter, Professional, and
  Enterprise tiers raise credits and concurrency. Annual subscriptions add a
  10% discount with all credits granted upfront. Larger needs are handled via
  a Custom tier.
notes: >-
  Prices, credit allotments, and session limits are from the Airtop pricing
  page and are subject to change; verify on the pricing page during
  reconciliation. Credit-to-operation conversion varies by action complexity.
sources:
- https://www.airtop.ai/pricing
- https://docs.airtop.ai
plans:
- id: airtop-free
  name: Free
  type: free
  description: >-
    Free starting tier with a base credit pool and limited concurrency for
    evaluating the cloud-browser API.
  entries:
  - label: Included Credits
    name: free_credits
    type: feature
    metric: credits
    limit: 1000
    timeFrame: month
    geo: global
    unit: 1
    price: $0
    userMultiplied: false
  - label: Simultaneous Sessions
    name: free_sessions
    type: feature
    metric: sessions
    limit: 3
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: Sessions
  - name: Windows
  - name: Page Interaction
  - name: AI Query and Extraction
  - name: Screenshots
  - name: Profiles
- id: airtop-starter
  name: Starter
  type: subscription
  description: >-
