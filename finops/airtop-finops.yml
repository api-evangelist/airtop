description: >-
  FinOps view of Airtop spend. Airtop bills a monthly subscription per tier
  that bundles a pool of credits and a simultaneous-session cap. Credits are
  the unit of consumption: page loads, navigations, page interactions
  (click / type / hover / scroll), scraping, screenshots, and AI page-query /
  paginated-extraction operations each draw down credits, with more complex
  work (such as captcha solving) costing more. Annual plans grant all credits
  upfront with a 10% discount. Cost control centers on credit burn per
  operation, session concurrency, and per-call cost/time thresholds.
notes: >-
  Credit-to-operation rates and tier credit pools are subject to change;
  verify against the Airtop pricing page during reconciliation. Airtop does
  not publish a FOCUS billing export; FOCUS columns below are a mapping for
  internal cost normalization.
sources:
- https://www.airtop.ai/pricing
- https://docs.airtop.ai
