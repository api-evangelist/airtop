meters:
- name: subscription_fee
  description: Monthly (or annual) tier fee bundling a credit pool and concurrency cap.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: credits_consumed
  description: Credits drawn down by all browser operations across the account.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - session
  - operation
- name: session_runtime
  description: Cloud browser session activity contributing to credit consumption.
  unit: sessions
  aggregation: sum
  dimensions:
  - account
  - session
- name: ai_operation_credits
  description: Credits consumed by AI page-query, paginated-extraction, and interaction resolution.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - operation
- name: captcha_solve_credits
  description: Additional credits consumed when automatic captcha solving is used.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - session
principles:
- name: Visibility
  description: Track credit burn per session and per operation type; watch the monthly credit pool against tier allotment.
- name: Allocation
  description: Tag API keys or sessions per workload/team and map credit consumption to internal cost centers.
- name: Optimization
  description: Bound expensive AI calls with costThresholdCredits and timeThresholdSeconds; reuse profiles to avoid re-login work; avoid unnecessary captcha solving; right-size the tier to actual concurrency needs; prefer annual billing for the 10% discount.
- name: Accountability
  description: Assign owners per project/key; review credit spend monthly against the tier budget and upgrade or downgrade tiers as concurrency demand changes.
